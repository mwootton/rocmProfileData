name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get install -y sqlite3 libsqlite3-dev libfmt-dev nlohmann-json3-dev libzstd-dev xxd

      - name: Build
        run: make
